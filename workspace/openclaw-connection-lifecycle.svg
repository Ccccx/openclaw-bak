<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>
    
    <style>
      @keyframes slideIn {
        0% { opacity: 0; transform: translateX(-30px); }
        100% { opacity: 1; transform: translateX(0); }
      }
      @keyframes fadeIn {
        0% { opacity: 0; }
        100% { opacity: 1; }
      }
      @keyframes dash {
        to { stroke-dashoffset: -30; }
      }
      @keyframes pulse {
        0%, 100% { opacity: 0.5; }
        50% { opacity: 1; }
      }
      .slide-in { animation: slideIn 0.5s ease-out forwards; }
      .fade-in { animation: fadeIn 0.5s ease-out forwards; }
      .dash-anim { animation: dash 1s linear infinite; }
      .pulse-anim { animation: pulse 2s ease-in-out infinite; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="900" height="600" fill="url(#bgGrad)"/>
  
  <!-- Title -->
  <text x="450" y="40" font-family="Arial, sans-serif" font-size="26" fill="#fff" text-anchor="middle" font-weight="bold">
    🔄 连接生命周期
  </text>
  <text x="450" y="65" font-family="Arial, sans-serif" font-size="14" fill="#aaa" text-anchor="middle">
    Gateway Connection Lifecycle
  </text>

  <!-- Client -->
  <g transform="translate(100, 200)" class="slide-in">
    <rect x="0" y="0" width="120" height="150" rx="15" fill="#2d3436" stroke="#00d9ff" stroke-width="3"/>
    <text x="60" y="30" font-family="Arial" font-size="16" fill="#00d9ff" text-anchor="middle" font-weight="bold">Client</text>
    <text x="60" y="50" font-family="Arial" font-size="10" fill="#888" text-anchor="middle">CLI / Web UI</text>
    <text x="60" y="65" font-family="Arial" font-size="10" fill="#888" text-anchor="middle">macOS App</text>
    <text x="60" y="80" font-family="Arial" font-size="10" fill="#888" text-anchor="middle">Automation</text>
    
    <!-- Request/Response icons -->
    <g transform="translate(30, 100)" class="pulse-anim">
      <rect x="0" y="0" width="60" height="35" rx="8" fill="#1e272e" stroke="#00d9ff"/>
      <text x="30" y="22" font-family="Arial" font-size="9" fill="#00d9ff" text-anchor="middle">req:connect</text>
    </g>
  </g>

  <!-- Gateway -->
  <g transform="translate(400, 180)" class="slide-in" style="animation-delay: 0.2s">
    <rect x="0" y="0" width="150" height="200" rx="20" fill="#0f3460" stroke="#e94560" stroke-width="3"/>
    <text x="75" y="35" font-family="Arial" font-size="18" fill="#fff" text-anchor="middle" font-weight="bold">🦞 Gateway</text>
    <text x="75" y="55" font-family="Arial" font-size="10" fill="#aaa" text-anchor="middle">WebSocket Server</text>
    
    <!-- Connection state -->
    <g transform="translate(20, 75)">
      <rect x="0" y="0" width="110" height="40" rx="8" fill="#1e272e" stroke="#636e72"/>
      <text x="55" y="18" font-family="Arial" font-size="10" fill="#888" text-anchor="middle">State: Disconnected</text>
      <text x="55" y="32" font-family="Arial" font-size="8" fill="#666" text-anchor="middle">→ Validating...</text>
    </g>
    
    <!-- Validation -->
    <g transform="translate(20, 125)">
      <rect x="0" y="0" width="110" height="40" rx="8" fill="#1e272e" stroke="#00ff88"/>
      <text x="55" y="25" font-family="Arial" font-size="10" fill="#00ff88" text-anchor="middle">✓ Auth OK</text>
    </g>
  </g>

  <!-- Arrow 1: Connect Request -->
  <g transform="translate(220, 260)" class="fade-in" style="animation-delay: 0.3s">
    <path d="M 0 10 L 100 10" stroke="#00d9ff" stroke-width="3" fill="none" marker-end="url(#arrow1)"/>
    <text x="50" y="0" font-family="Arial" font-size="10" fill="#00d9ff" text-anchor="middle">connect frame</text>
    <text x="50" y="-12" font-family="Arial" font-size="8" fill="#888" text-anchor="middle">{type:"req", id, method}</text>
  </g>
  
  <!-- Arrow marker -->
  <defs>
    <marker id="arrow1" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#00d9ff"/>
    </marker>
    <marker id="arrow2" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#00ff88"/>
    </marker>
  </defs>

  <!-- Arrow 2: Response -->
  <g transform="translate(220, 320)" class="fade-in" style="animation-delay: 0.5s">
    <path d="M 100 10 L 0 10" stroke="#00ff88" stroke-width="3" fill="none" marker-end="url(#arrow2)"/>
    <text x="50" y="0" font-family="Arial" font-size="10" fill="#00ff88" text-anchor="middle">res: hello-ok</text>
    <text x="50" y="-12" font-family="Arial" font-size="8" fill="#888" text-anchor="middle">snapshot: presence, health</text>
  </g>

  <!-- Sequence Diagram Box -->
  <g transform="translate(650, 150)" class="fade-in" style="animation-delay: 0.6s">
    <rect x="0" y="0" width="200" height="250" rx="10" fill="#1e272e" stroke="#636e72" stroke-width="2"/>
    <text x="100" y="25" font-family="Arial" font-size="12" fill="#fff" text-anchor="middle" font-weight="bold">序列流程</text>
    
    <!-- Step 1 -->
    <g transform="translate(15, 40)">
      <circle cx="8" cy="8" r="8" fill="#00d9ff"/>
      <text x="25" y="12" font-family="Arial" font-size="9" fill="#ccc">Client → Gateway</text>
      <text x="25" y="24" font-family="Arial" font-size="8" fill="#888">req:connect</text>
    </g>
    
    <!-- Step 2 -->
    <g transform="translate(15, 70)">
      <circle cx="8" cy="8" r="8" fill="#00ff88"/>
      <text x="25" y="12" font-family="Arial" font-size="9" fill="#ccc">Gateway → Client</text>
      <text x="25" y="24" font-family="Arial" font-size="8" fill="#888">res (ok) + snapshot</text>
    </g>
    
    <!-- Step 3 -->
    <g transform="translate(15, 100)">
      <circle cx="8" cy="8" r="8" fill="#ffd93d"/>
      <text x="25" y="12" font-family="Arial" font-size="9" fill="#ccc">Gateway → Client</text>
      <text x="25" y="24" font-family="Arial" font-size="8" fill="#888">event:presence</text>
    </g>
    
    <!-- Step 4 -->
    <g transform="translate(15, 130)">
      <circle cx="8" cy="8" r="8" fill="#ffd93d"/>
      <text x="25" y="12" font-family="Arial" font-size="9" fill="#ccc">Gateway → Client</text>
      <text x="25" y="24" font-family="Arial" font-size="8" fill="#888">event:tick</text>
    </g>
    
    <!-- Step 5 -->
    <g transform="translate(15, 160)">
      <circle cx="8" cy="8" r="8" fill="#e94560"/>
      <text x="25" y="12" font-family="Arial" font-size="9" fill="#ccc">Client → Gateway</text>
      <text x="25" y="24" font-family="Arial" font-size="8" fill="#888">req:agent</text>
    </g>
    
    <!-- Step 6 -->
    <g transform="translate(15, 190)">
      <circle cx="8" cy="8" r="8" fill="#a55eea"/>
      <text x="25" y="12" font-family="Arial" font-size="9" fill="#ccc">Gateway → Client</text>
      <text x="25" y="24" font-family="Arial" font-size="8" fill="#888">event:agent (stream)</text>
    </g>
    
    <!-- Step 7 -->
    <g transform="translate(15, 220)">
      <circle cx="8" cy="8" r="8" fill="#00ff88"/>
      <text x="25" y="12" font-family="Arial" font-size="9" fill="#ccc">Gateway → Client</text>
      <text x="25" y="24" font-family="Arial" font-size="8" fill="#888">res:agent (final)</text>
    </g>
  </g>

  <!-- Auth Details -->
  <g transform="translate(100, 450)" class="fade-in" style="animation-delay: 0.7s">
    <rect x="0" y="0" width="300" height="120" rx="10" fill="#1e272e" stroke="#ff6b6b" stroke-width="2"/>
    <text x="150" y="25" font-family="Arial" font-size="12" fill="#ff6b6b" text-anchor="middle" font-weight="bold">🔐 认证流程</text>
    
    <g transform="translate(20, 45)">
      <text x="0" y="0" font-family="Arial" font-size="10" fill="#ccc">1. 首帧必须是 connect</text>
    </g>
    <g transform="translate(20, 65)">
      <text x="0" y="0" font-family="Arial" font-size="10" fill="#ccc">2. 设备身份 + 签名验证</text>
    </g>
    <g transform="translate(20, 85)">
      <text x="0" y="0" font-family="Arial" font-size="10" fill="#ccc">3. 幂等键用于 send/agent</text>
    </g>
    <g transform="translate(20, 105)">
      <text x="0" y="0" font-family="Arial" font-size="10" fill="#ccc">4. 本地自动批准，远程需确认</text>
    </g>
  </g>

  <!-- Protocol Details -->
  <g transform="translate(450, 450)" class="fade-in" style="animation-delay: 0.8s">
    <rect x="0" y="0" width="200" height="120" rx="10" fill="#1e272e" stroke="#00d9ff" stroke-width="2"/>
    <text x="100" y="25" font-family="Arial" font-size="12" fill="#00d9ff" text-anchor="middle" font-weight="bold">📡 协议格式</text>
    
    <g transform="translate(20, 45)">
      <text x="0" y="0" font-family="monospace" font-size="9" fill="#888">{"type":"req",</text>
    </g>
    <g transform="translate(20, 60)">
      <text x="0" y="0" font-family="monospace" font-size="9" fill="#888"> "id", "method",</text>
    </g>
    <g transform="translate(20, 75)">
      <text x="0" y="0" font-family="monospace" font-size="9" fill="#888"> "params"}</text>
    </g>
    <g transform="translate(20, 95)">
      <text x="0" y="0" font-family="Arial" font-size="9" fill="#666">→ JSON over WebSocket</text>
    </g>
  </g>

  <!-- Node Flow -->
  <g transform="translate(680, 450)" class="fade-in" style="animation-delay: 0.9s">
    <rect x="0" y="0" width="180" height="120" rx="10" fill="#1e272e" stroke="#a55eea" stroke-width="2"/>
    <text x="90" y="25" font-family="Arial" font-size="12" fill="#a55eea" text-anchor="middle" font-weight="bold">📱 Node 连接</text>
    
    <g transform="translate(15, 45)">
      <text x="0" y="0" font-family="Arial" font-size="9" fill="#ccc">• role: "node"</text>
    </g>
    <g transform="translate(15, 60)">
      <text x="0" y="0" font-family="Arial" font-size="9" fill="#ccc">• 设备身份</text>
    </g>
    <g transform="translate(15, 75)">
      <text x="0" y="0" font-family="Arial" font-size="9" fill="#ccc">• caps/commands</text>
    </g>
    <g transform="translate(15, 90)">
      <text x="0" y="0" font-family="Arial" font-size="9" fill="#ccc">• canvas/camera/screen</text>
    </g>
  </g>
</svg>
